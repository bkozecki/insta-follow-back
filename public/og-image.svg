<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="20%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Top orange accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#f97316"/>

  <!-- Decorative large icon (right side, faded) -->
  <g transform="translate(720, 75) scale(20)" stroke="#f97316" stroke-width="0.1" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.07">
    <circle cx="12" cy="12" r="10"/>
    <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
    <line x1="9.69" y1="8" x2="21.17" y2="8"/>
    <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
    <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
    <line x1="14.31" y1="16" x2="2.83" y2="16"/>
    <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
  </g>

  <!-- Logo icon (80×80) -->
  <g transform="translate(80, 140) scale(3.33)" stroke="#f97316" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="12" cy="12" r="10"/>
    <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
    <line x1="9.69" y1="8" x2="21.17" y2="8"/>
    <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
    <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
    <line x1="14.31" y1="16" x2="2.83" y2="16"/>
    <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
  </g>

  <!-- "Folo." logotype -->
  <text x="178" y="207" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="86" font-weight="800" letter-spacing="-3" fill="#ffffff">Folo<tspan fill="#f97316">.</tspan></text>

  <!-- Divider -->
  <rect x="80" y="242" width="580" height="1.5" fill="#272727"/>

  <!-- Main tagline -->
  <text x="80" y="313" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="40" font-weight="400" fill="#f0f0f0">Find out who doesn't follow you back</text>
  <text x="80" y="366" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="40" font-weight="400" fill="#f0f0f0">on Instagram.</text>

  <!-- Sub-description -->
  <text x="80" y="418" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" fill="#777777">Upload your data export and get instant results in seconds.</text>

  <!-- Feature badges -->
  <rect x="80" y="456" width="88" height="36" rx="18" fill="none" stroke="#f97316" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="124" y="479" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#f97316" text-anchor="middle" font-weight="600">Free</text>

  <rect x="182" y="456" width="122" height="36" rx="18" fill="none" stroke="#f97316" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="243" y="479" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#f97316" text-anchor="middle" font-weight="600">No login</text>

  <rect x="318" y="456" width="106" height="36" rx="18" fill="none" stroke="#f97316" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="371" y="479" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#f97316" text-anchor="middle" font-weight="600">Private</text>

  <!-- Domain URL -->
  <text x="1120" y="598" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" fill="#444444" text-anchor="end">folo.foo</text>
</svg>
